<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>球隊今日先發陣容（自動更新版）</title>
    <style>
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #1a4329; margin-bottom: 20px; }
        .loading { font-size: 18px; color: #666; margin-top: 50px; }
        
        .container {
            display: none; /* 載入完成前先隱藏 */
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }

        .lineup-table {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 320px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: #1a4329; color: white; }

        .field-container {
            position: relative;
            width: 450px;
            height: 450px;
            background-color: #2e8b57;
            border: 5px solid #fff;
            border-radius: 0 100% 0 0;
            transform: rotate(-45deg);
            margin: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .player-badge {
            position: absolute;
            background: #fff;
            color: #333;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            border: 2px solid #1a4329;
            transform: rotate(45deg);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            text-align: center;
            min-width: 60px;
        }

        /* 守位定位 */
        .P  { bottom: 130px; left: 130px; }
        .C  { bottom: 20px;  left: 20px;  }
        .1B { bottom: 220px; left: 60px;  }
        .2B { bottom: 260px; left: 160px; }
        .3B { bottom: 60px;  left: 220px; }
        .SS { bottom: 160px; left: 260px; }
        .LF { bottom: 120px; left: 350px; }
        .CF { bottom: 270px; left: 270px; }
        .RF { bottom: 350px; left: 120px; }
    </style>
</head>
<body>

    <h1>今日先發名單與守備位置</h1>
    <div id="loading" class="loading">正在連線 Google 試算表抓取最新名單...</div>

    <div class="container" id="mainContainer">
        <div class="lineup-table">
            <h2>打擊順序</h2>
            <table>
                <thead>
                    <tr>
                        <th>棒次</th>
                        <th>守位</th>
                        <th>姓名</th>
                        <th>背號</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>

        <div class="field-container" id="fieldContainer">
            </div>
    </div>

    <script>
        // ⚠️ 請把下方引號內的字串，換成你自己的 Google 試算表 ID
        const sheetId = '1cdjXciZzhJ5eG_OfUt612M2DDR4K2vJhqKrecp2ZUoo'; 
        
        // 透過 Google 提供的 CSV 匯出連結來讀取資料
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

        fetch(url)
            .then(res => res.text())
            .then(data => {
                // 解析 CSV 資料
                const rows = data.split('\n').map(row => {
                    return row.split(',').map(cell => cell.replace(/^"(.*)"$/, '$1'));
                });

                const tableBody = document.getElementById('tableBody');
                const fieldContainer = document.getElementById('fieldContainer');
                
                // 跳過第一列標題，從第二列開始跑資料
                for (let i = 1; i < rows.length; i++) {
                    if (!rows[i][0]) continue; // 略過空行
                    
                    const order = rows[i][0];  // A欄：棒次
                    const pos = rows[i][1];    // B欄：守位
                    const name = rows[i][2];   // C欄：姓名 (已更換)
                    const num = rows[i][3];    // D欄：背號 (已更換)

                    // 1. 填入表格
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${order}</td><td>${pos}</td><td>${name}</td><td>${num}</td>`;
                    tableBody.appendChild(tr);

                    // 2. 如果不是 DH（指定打擊），就畫在球場上
                    if (pos !== 'DH' && pos !== 'dh') {
                        const badge = document.createElement('div');
                        badge.className = `player-badge ${pos.toUpperCase()}`;
                        badge.innerHTML = `${pos.toUpperCase()}<br>${name}`;
                        fieldContainer.appendChild(badge);
                    }
                }

                // 隱藏載入中，顯示網頁
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'flex';
            })
            .catch(err => {
                document.getElementById('loading').innerText = '讀取名單失敗，請檢查試算表是否開啟公開共用。';
                console.error(err);
            });
    </script>
</body>
</html>
