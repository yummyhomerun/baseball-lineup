<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>球隊今日先發陣容（完美修正版）</title>
    <style>
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #1a4329; margin-bottom: 20px; }
        .loading { font-size: 18px; color: #666; margin-top: 50px; }
        
        .container {
            display: none; /* 載入完成前先隱藏 */
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1100px;
            width: 100%;
            align-items: flex-start;
        }

        /* 左側打擊表 */
        .lineup-table {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 320px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: #1a4329; color: white; }

        /* 右側棒球場：改用正向扇形，不再旋轉，避免坐標錯亂 */
        .field-container {
            position: relative;
            width: 450px;
            height: 450px;
            background-color: #2e8b57;
            border: 5px solid #fff;
            border-radius: 0 100% 0 0; /* 扇形 */
            transform: scaleY(-1) rotate(-90deg); /* 翻轉成標準棒球場視角：本壘在正下方 */
            margin: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        /* 球員標籤：反向翻轉文字，確保文字永遠是正的 */
        .player-badge {
            position: absolute;
            background: #fff;
            color: #333;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            border: 2px solid #1a4329;
            transform: rotate(90deg) scaleY(-1); /* 轉回正常人類視覺 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            text-align: center;
            min-width: 55px;
        }

        /* 🎯 精準修正後的守備位置坐標 (適用於正向扇形) */
        .C  { bottom: 25px;  left: 25px;  }
        .P  { bottom: 125px; left: 125px; }
        .1B { bottom: 65px;  left: 215px; }
        .2B { bottom: 155px; left: 255px; }
        .SS { bottom: 255px; left: 155px; }
        .3B { bottom: 215px; left: 65px;  }
        .LF { bottom: 330px; left: 110px; }
        .CF { bottom: 310px; left: 310px; }
        .RF { bottom: 110px; left: 330px; }
    </style>
</head>
<body>

    <h1>今日先發名單與守備位置</h1>
    <div id="loading" class="loading">正在連線 Google 試算表抓取最新名單...</div>

    <div class="container" id="mainContainer">
        <div class="lineup-table">
            <h2>打擊順序</h2>
            <table>
                <thead>
                    <tr>
                        <th>棒次</th>
                        <th>守位</th>
                        <th>姓名</th>
                        <th>背號</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>

        <div class="field-container" id="fieldContainer">
            </div>
    </div>

    <script>
        // ⚠️ 請更換成您自己的 Google 試算表 ID
        const sheetId = '1cdjXciZzhJ5eG_OfUt612M2DDR4K2vJhqKrecp2ZUoo'; 
        
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

        fetch(url)
            .then(res => res.text())
            .then(data => {
                const rows = data.split('\n').map(row => {
                    return row.split(',').map(cell => cell.replace(/^"(.*)"$/, '$1').trim());
                });

                const tableBody = document.getElementById('tableBody');
                const fieldContainer = document.getElementById('fieldContainer');
                
                for (let i = 1; i < rows.length; i++) {
                    if (!rows[i][0]) continue; 
                    
                    const order = rows[i][0];  // A欄：棒次
                    const pos = rows[i][1].toUpperCase(); // B欄：守位 (轉大寫避免錯字)
                    const name = rows[i][2];   // C欄：姓名
                    const num = rows[i][3];    // D欄：背號

                    // 1. 填入表格
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${order}</td><td>${pos}</td><td>${name}</td><td>${num}</td>`;
                    tableBody.appendChild(tr);

                    // 2. 渲染到球場上
                    const validPositions = ['P', 'C', '1B', '2B', '3B', 'SS', 'LF', 'CF', 'RF'];
                    if (validPositions.includes(pos)) {
                        const badge = document.createElement('div');
                        badge.className = `player-badge ${pos}`;
                        badge.innerHTML = `${pos}<br>${name}`;
                        fieldContainer.appendChild(badge);
                    }
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'flex';
            })
            .catch(err => {
                document.getElementById('loading').innerText = '讀取名單失敗，請檢查試算表是否開啟公開共用。';
                console.error(err);
            });
    </script>
</body>
</html>
