<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>球員守備位置與打擊棒次</title>
    <style>
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #1a4329; margin-bottom: 20px; }
        .loading { font-size: 18px; color: #666; margin-top: 50px; }
        
        .container {
            display: none; /* 載入完成前先隱藏 */
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1100px;
            width: 100%;
            align-items: flex-start;
        }

        /* 左側打擊表 */
        .lineup-table {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 320px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: #1a4329; color: white; }

        /* 右側棒球場：傳統四方形，不套用任何旋轉，安全第一 */
        .field-container {
            position: relative;
            width: 450px;
            height: 450px;
            background-color: #2e8b57;
            border: 5px solid #fff;
            border-radius: 12px; /* 乖乖做圓角矩形就好 */
            margin: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            background-image: radial-gradient(circle at 50% 85%, #d2b48c 0px, #d2b48c 80px, transparent 81px); /* 內野泥土區示意 */
        }
        
        /* 球員標籤 */
        .player-badge {
            position: absolute;
            background: #fff;
            color: #333;
            padding: 6px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            border: 2px solid #1a4329;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            text-align: center;
            min-width: 60px;
        }

        /* 🎯 以 450x450 正向常規坐標系進行絕對定位 */
        /* bottom 代表距離底部多遠，left 代表距離左邊多遠 */
        .C  { bottom: 20px;  left: 195px; } /* 本壘在最下方的中間 */
        .P  { bottom: 130px; left: 195px; } /* 投手丘 */
        
        .1B { bottom: 200px; left: 310px; } /* 一壘在右 */
        .2B { bottom: 270px; left: 260px; } /* 二壘在右中 */
        .SS { bottom: 270px; left: 130px; } /* 游擊在左中 */
        .3B { bottom: 200px; left: 80px;  } /* 三壘在左 */
        
        .LF { bottom: 350px; left: 50px;  } /* 左外野 */
        .CF { bottom: 380px; left: 195px; } /* 中外野 */
        .RF { bottom: 350px; left: 340px; } /* 右外野 */
    </style>
</head>
<body>

    <h1>今日先發名單與守備位置</h1>
    <div id="loading" class="loading">正在連線 Google 試算表抓取最新名單...</div>

    <div class="container" id="mainContainer">
        <div class="lineup-table">
            <h2>打擊順序</h2>
            <table>
                <thead>
                    <tr>
                        <th>棒次</th>
                        <th>守位</th>
                        <th>姓名</th>
                        <th>背號</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>

        <div class="field-container" id="fieldContainer">
            </div>
    </div>

    <script>
        // ⚠️ 請把引號內換成您自己的 Google 試算表 ID
        const sheetId = '1cdjXciZzhJ5eG_OfUt612M2DDR4K2vJhqKrecp2ZUoo'; 
        
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

        fetch(url)
            .then(res => res.text())
            .then(data => {
                const rows = data.split('\n').map(row => {
                    return row.split(',').map(cell => cell.replace(/^"(.*)"$/, '$1').trim());
                });

                const tableBody = document.getElementById('tableBody');
                const fieldContainer = document.getElementById('fieldContainer');
                
                for (let i = 1; i < rows.length; i++) {
                    if (!rows[i][0]) continue; 
                    
                    const order = rows[i][0];  
                    const pos = rows[i][1].toUpperCase(); 
                    const name = rows[i][2];   
                    const num = rows[i][3];    

                    // 1. 填入表格
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${order}</td><td>${pos}</td><td>${name}</td><td>${num}</td>`;
                    tableBody.appendChild(tr);

                    // 2. 渲染到球場上
                    const validPositions = ['P', 'C', '1B', '2B', '3B', 'SS', 'LF', 'CF', 'RF'];
                    if (validPositions.includes(pos)) {
                        const badge = document.createElement('div');
                        badge.className = `player-badge ${pos}`;
                        badge.innerHTML = `${pos}<br>${name}`;
                        fieldContainer.appendChild(badge);
                    }
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'flex';
            })
            .catch(err => {
                document.getElementById('loading').innerText = '讀取名單失敗，請檢查試算表是否開啟公開共用。';
                console.error(err);
            });
    </script>
</body>
</html>
